name: Termux-Pro CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  termux-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install proot-distro
        run: |
          sudo apt update
          sudo apt install -y proot-distro

      - name: Bootstrap Termux container
        run: |
          proot-distro install ubuntu
          proot-distro login ubuntu -- echo "✓ Termux base bootstrapped"

      - name: Run setup script inside Termux container
        run: |
          proot-distro login ubuntu -- bash -c "
            apt update && apt install -y curl git python3 python3-pip
            cd /root && git clone $GITHUB_WORKSPACE Termux-Pro
            cd Termux-Pro && bash scripts/setup.sh
          "

      - name: Verify installation
        run: |
          proot-distro login ubuntu -- bash -c "
            [ -f /root/Termux-Pro/scripts/setup.sh ] && echo 'Setup ✓' || echo 'Setup ✗'
            [ -d /root/Termux-Pro/src/termux_pro/plugins ] && echo 'Plugins ✓' || echo 'Plugins ✗'
          "
